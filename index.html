<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 손익 계산기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>

    .sparkle {
  position: fixed; 
  pointer-events: none;
  width: var(--size); height: var(--size);
  filter:
  blur(.4px)
  drop-shadow(0 0 4px currentColor)
  drop-shadow(0 0 10px currentColor)
  drop-shadow(0 0 22px currentColor);
  animation: sparkleAnim var(--dur) ease-out forwards;
            mix-blend-mode:screen;
}
@keyframes sparkleAnim {
  0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; }
  100% { transform: translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0); opacity:0; }
}
</head>
<body>
  
  @import url(https://fonts.googleapis.com/css?family=Khula:700);
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 32px 16px;
  }

  /* 콘솔 타이핑 */
  .console-container {
    font-family: Khula;
    font-size: clamp(1.2em, 4vw, 2.2em);
    text-align: center;
    min-height: 60px;
    display: block;
    color: white;
    margin: 0 auto 16px;
    padding: 0 12px;
    word-break: keep-all;
  }
  .hidden { opacity: 0; }
  .console-underscore {
    display: inline-block;
    position: relative;
    top: -0.14em;
    left: 6px;
  }

  h1 {
    text-align: center;
    font-size: clamp(15px, 4vw, 22px);
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #f0db4f;
    margin-bottom: 8px;
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 28px;
    padding: 0 8px;
  }

  .input-section {
    max-width: 560px;
    margin: 0 auto 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .row { display: flex; gap: 8px; }

  /* 모바일에서 행 쌓기 */
  @media (max-width: 480px) {
    .row.wrap-mobile { flex-wrap: wrap; }
    .row.wrap-mobile input { min-width: calc(50% - 4px); }
  }

  input {
    flex: 1;
    padding: 11px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #f0f0f0;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  input:focus { border-color: #f0db4f; }
  input::placeholder { color: #444; font-size: 13px; }

  button.button {
    --bg: #f0db4f;
    --hover-bg: #ff6b6b;
    position: relative;
    padding: 13px 32px;
    border: none;
    background: var(--bg);
    cursor: pointer;
    clip-path: polygon(92% 0, 100% 25%, 100% 100%, 8% 100%, 0% 75%, 0 0);
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a1a1a;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Pretendard', sans-serif;
    overflow: hidden;
    transition: transform 0.2s;
    white-space: nowrap;
  }
  button.button::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--hover-bg);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 0;
  }
  button.button:hover::before { opacity: 1; }
  button.button:hover { transform: translateY(-2px); }
  button.button span { position: relative; z-index: 1; }

  /* 모바일에서 추가하기 버튼 꽉 채우기 */
  @media (max-width: 480px) {
    button.button {
      width: 100%;
      clip-path: polygon(97% 0, 100% 30%, 100% 100%, 3% 100%, 0% 70%, 0 0);
    }
  }

  .naver-btn {
    background: none;
    border: 1px solid #333;
    border-radius: 4px;
    color: #03c75a;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    padding: 0 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .naver-btn:hover { background: #1a1a1a; }

  .results {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 16px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
  }

  .card-main {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
  }

  .card-left { display: flex; flex-direction: column; gap: 5px; }
  .stock-name { font-size: 15px; font-weight: 600; color: #f0f0f0; }
  .stock-detail { font-size: 11px; color: #555; line-height: 1.6; }

  /* 모바일에서 상세 줄바꿈 */
  @media (max-width: 400px) {
    .stock-detail { font-size: 10px; }
  }

  .card-right { text-align: right; flex-shrink: 0; }

  .pnl { font-size: clamp(17px, 4vw, 22px); font-weight: 700; letter-spacing: -0.5px; }
  .pnl.profit { color: #ff6b6b; }
  .pnl.loss   { color: #4d9fff; }
  .pnl.zero   { color: #666; }

  .pnl-rate { font-size: 12px; margin-top: 2px; }
  .pnl-rate.profit { color: #ff6b6b88; }
  .pnl-rate.loss   { color: #4d9fff88; }

  .card-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .action-btn {
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'Pretendard', sans-serif;
    padding: 5px 10px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .action-btn.edit     { color: #888; }
  .action-btn.edit:hover     { color: #f0db4f; border-color: #f0db4f44; }
  .action-btn.sell     { color: #888; }
  .action-btn.sell:hover     { color: #03c75a; border-color: #03c75a44; }
  .action-btn.delete-a { color: #888; }
  .action-btn.delete-a:hover { color: #ff6b6b; border-color: #ff6b6b44; }

  .edit-form {
    display: none;
    flex-direction: column;
    gap: 8px;
    border-top: 1px solid #2a2a2a;
    padding-top: 10px;
  }
  .edit-form.open { display: flex; }
  .edit-form .row { gap: 8px; flex-wrap: wrap; }
  .edit-form input { font-size: 13px; padding: 8px 12px; min-width: calc(50% - 4px); }
  .edit-form-actions { display: flex; gap: 6px; justify-content: flex-end; }

  .save-btn {
    background: #f0db4f;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    color: #1a1a1a;
    padding: 7px 18px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: #ff6b6b; color: #fff; }

  .cancel-btn {
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    color: #555;
    padding: 7px 14px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .cancel-btn:hover { color: #ff6b6b; }

  .empty {
    text-align: center;
    color: #333;
    font-size: 13px;
    padding: 40px 0;
  }

  .summary {
    max-width: 560px;
    margin: 18px auto 0;
    border-top: 1px solid #222;
    padding-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .summary-label { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .summary-val { font-size: clamp(17px, 4vw, 20px); font-weight: 700; }

  .record-wrap {
    max-width: 560px;
    margin: 16px auto 0;
    display: flex;
    justify-content: flex-end;
  }

  .history-section {
    max-width: 560px;
    margin: 32px auto 0;
  }

  .history-title {
    font-size: 12px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .clear-btn {
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    color: #444;
    font-size: 11px;
    font-family: 'Pretendard', sans-serif;
    padding: 4px 10px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .clear-btn:hover { color: #ff6b6b; border-color: #ff6b6b44; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    text-align: left;
    padding: 8px 10px;
    color: #444;
    border-bottom: 1px solid #222;
    font-weight: 500;
  }
  tbody tr { border-bottom: 1px solid #1e1e1e; transition: background 0.15s; }
  tbody tr:hover { background: #161616; }
  tbody td { padding: 9px 10px; color: #888; }
  tbody td.date-col { color: #555; font-size: 11px; white-space: nowrap; }
  tbody td.pnl-col { font-weight: 600; white-space: nowrap; }
  tbody td.pnl-col.profit { color: #ff6b6b; }
  tbody td.pnl-col.loss   { color: #4d9fff; }
  tbody td.pnl-col.zero   { color: #555; }
  .diff-col.up   { color: #ff6b6b88; }
  .diff-col.down { color: #4d9fff88; }
  .diff-col.same { color: #444; }

  /* 모바일에서 테이블 글자 더 작게 */
  @media (max-width: 400px) {
    table { font-size: 11px; }
    tbody td { padding: 8px 6px; }
    thead th { padding: 8px 6px; }
  }

  .no-history {
    text-align: center;
    color: #333;
    font-size: 13px;
    padding: 30px 0;
  }
</style>


<!-- 콘솔 타이핑 -->
<div class='console-container'>
  <span id='text'></span>
  <div class='console-underscore' id='console'>&#95;</div>
</div>

<h1>📈 주식 손익 계산기</h1>
<p class="subtitle">평단가와 현재가를 입력하면 손익을 계산해드려요</p>

<div class="input-section">
  <div class="row">
    <input id="stockName" type="text" placeholder="종목명 (예: 삼성전자)">
    <button class="naver-btn" onclick="openNaver()">네이버 증권 →</button>
  </div>
  <div class="row wrap-mobile">
    <input id="avgPrice" type="number" placeholder="평단가 (원)">
    <input id="curPrice" type="number" placeholder="현재가 (원)">
    <input id="quantity" type="number" placeholder="수량 (주)">
  </div>
  <div class="row" style="justify-content:center;">
    <button class="button" onclick="addStock()"><span>추가하기</span></button>
  </div>
</div>

<div class="results" id="results">
  <p class="empty">종목을 추가해보세요 👆</p>
</div>

<div class="summary" id="summary" style="display:none;">
  <span class="summary-label">총 손익</span>
  <span class="summary-val" id="totalPnl">—</span>
</div>

<div class="record-wrap" id="recordWrap" style="display:none;">
  <button class="button" onclick="recordToday()"><span>오늘 손익 기록</span></button>
</div>

<div class="history-section">
  <div class="history-title">
    <span>일자별 손익 기록</span>
    <button class="clear-btn" onclick="clearHistory()">전체 삭제</button>
  </div>
  <div id="historyTable"></div>
</div>

<script>
// ── 스파클 커서 효과 ──
const sparkColors = ['#FFD700','#FF69B4','#00CFFF','#B388FF','#69FF47','#FF6B6B','#FFA500'];
let sparkLast = 0;

function sparkSVG(c) {
  const t = Math.random();
  if (t < 0.4) return `<svg viewBox="0 0 20 20"><path d="M10 0 L11.5 8.5 L20 10 L11.5 11.5 L10 20 L8.5 11.5 L0 10 L8.5 8.5Z" fill="${c}"/></svg>`;
  if (t < 0.7) return `<svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="6" fill="${c}"/></svg>`;
  return `<svg viewBox="0 0 20 20"><rect x="8" y="0" width="4" height="20" rx="2" fill="${c}"/><rect x="0" y="8" width="20" height="4" rx="2" fill="${c}"/></svg>`;
}

document.addEventListener('mousemove', e => {
  const now = Date.now();
  if (now - sparkLast < 30) return;
  sparkLast = now;
  const count = Math.floor(Math.random() * 10) + 10;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const size = (Math.random() * 10 + 5) + 'px';
    const color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
    el.style.cssText = `
      left:${e.clientX}px; top:${e.clientY}px;
      --size:${size};
      --tx:${Math.random()*40-20}px;
      --ty:${Math.random()*40-20}px;
      --rot:${Math.random()*360}deg;
      --dur:${Math.random()*4+4}s;
    `;
    el.innerHTML = sparkSVG(color);
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 7000);
  }
});

  
  // ── 콘솔 타이핑 효과 ──
  consoleText(['내 주식은 오늘도 빨간불 🔴', '존버는 승리한다 💪', '오늘도 파이팅! 📈'], 'text', ['#f0db4f', '#ff6b6b', '#4d9fff']);

  function consoleText(words, id, colors) {
    if (colors === undefined) colors = ['#fff'];
    var visible = true;
    var con = document.getElementById('console');
    var letterCount = 1;
    var x = 1;
    var waiting = false;
    var target = document.getElementById(id);
    target.setAttribute('style', 'color:' + colors[0]);
    window.setInterval(function() {
      if (letterCount === 0 && waiting === false) {
        waiting = true;
        target.innerHTML = words[0].substring(0, letterCount);
        window.setTimeout(function() {
          var usedColor = colors.shift();
          colors.push(usedColor);
          var usedWord = words.shift();
          words.push(usedWord);
          x = 1;
          target.setAttribute('style', 'color:' + colors[0]);
          letterCount += x;
          waiting = false;
        }, 1000);
      } else if (letterCount === words[0].length + 1 && waiting === false) {
        waiting = true;
        window.setTimeout(function() {
          x = -1;
          letterCount += x;
          waiting = false;
        }, 1000);
      } else if (waiting === false) {
        target.innerHTML = words[0].substring(0, letterCount);
        letterCount += x;
      }
    }, 120);
    window.setInterval(function() {
      if (visible === true) {
        con.className = 'console-underscore hidden';
        visible = false;
      } else {
        con.className = 'console-underscore';
        visible = true;
      }
    }, 400);
  }

  // ── 주식 손익 계산기 ──
  let stocks  = JSON.parse(localStorage.getItem('stocks')  || '[]');
  let history = JSON.parse(localStorage.getItem('pnlHistory') || '[]');

  function openNaver() {
    const name = document.getElementById('stockName').value.trim();
    const query = name || '주식';
    window.open(`https://search.naver.com/search.naver?query=${encodeURIComponent(query + ' 주가')}`, '_blank');
  }

  function addStock() {
    const name = document.getElementById('stockName').value.trim();
    const avg  = parseFloat(document.getElementById('avgPrice').value);
    const cur  = parseFloat(document.getElementById('curPrice').value);
    const qty  = parseFloat(document.getElementById('quantity').value) || 1;

    if (!name || isNaN(avg) || isNaN(cur)) {
      alert('종목명, 평단가, 현재가를 모두 입력해주세요!');
      return;
    }

    stocks.push({ name, avg, cur, qty, id: Date.now() });
    save();

    document.getElementById('stockName').value = '';
    document.getElementById('avgPrice').value  = '';
    document.getElementById('curPrice').value  = '';
    document.getElementById('quantity').value  = '';

    render();
  }

  function deleteStock(id) {
    if (!confirm('이 종목을 삭제할까요?')) return;
    stocks = stocks.filter(s => s.id !== id);
    save();
    render();
  }

  function toggleEdit(id) {
    const form = document.getElementById('edit-' + id);
    form.classList.toggle('open');
  }

  function saveEdit(id) {
    const name = document.getElementById('eName-' + id).value.trim();
    const avg  = parseFloat(document.getElementById('eAvg-' + id).value);
    const cur  = parseFloat(document.getElementById('eCur-' + id).value);
    const qty  = parseFloat(document.getElementById('eQty-' + id).value);

    if (!name || isNaN(avg) || isNaN(cur) || isNaN(qty)) {
      alert('모든 항목을 올바르게 입력해주세요!');
      return;
    }

    const idx = stocks.findIndex(s => s.id === id);
    if (idx !== -1) stocks[idx] = { ...stocks[idx], name, avg, cur, qty };
    save();
    render();
  }

  function sellStock(id) {
    const s = stocks.find(s => s.id === id);
    if (!s) return;
    const pnl  = (s.cur - s.avg) * s.qty;
    const sign = pnl >= 0 ? '+' : '';
    const msg  = `${s.name} 매도 처리\n실현 손익: ${sign}${fmt(pnl)}\n\n종목을 목록에서 삭제할까요?`;
    if (confirm(msg)) {
      stocks = stocks.filter(s => s.id !== id);
      save();
      render();
    }
  }

  function save() {
    localStorage.setItem('stocks', JSON.stringify(stocks));
  }

  function fmt(n) {
    return n.toLocaleString('ko-KR') + '원';
  }

  function render() {
    const container  = document.getElementById('results');
    const summary    = document.getElementById('summary');
    const totalEl    = document.getElementById('totalPnl');
    const recordWrap = document.getElementById('recordWrap');

    if (stocks.length === 0) {
      container.innerHTML = '<p class="empty">종목을 추가해보세요 👆</p>';
      summary.style.display = 'none';
      recordWrap.style.display = 'none';
      return;
    }

    let totalPnl = 0;

    container.innerHTML = stocks.map(s => {
      const pnl   = (s.cur - s.avg) * s.qty;
      const rate  = ((s.cur - s.avg) / s.avg * 100).toFixed(2);
      const cls   = pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : 'zero';
      const sign  = pnl > 0 ? '+' : '';
      const arrow = pnl > 0 ? '▲' : pnl < 0 ? '▼' : '–';
      totalPnl += pnl;

      return `
        <div class="card">
          <div class="card-main">
            <div class="card-left">
              <span class="stock-name">${s.name}</span>
              <span class="stock-detail">평단 ${fmt(s.avg)} → 현재 ${fmt(s.cur)} · ${s.qty}주</span>
            </div>
            <div class="card-right">
              <div class="pnl ${cls}">${sign}${fmt(pnl)}</div>
              <div class="pnl-rate ${cls}">${arrow} ${sign}${rate}%</div>
            </div>
          </div>
          <div class="edit-form" id="edit-${s.id}">
            <div class="row">
              <input id="eName-${s.id}" type="text"   value="${s.name}" placeholder="종목명">
              <input id="eAvg-${s.id}"  type="number" value="${s.avg}"  placeholder="평단가">
            </div>
            <div class="row">
              <input id="eCur-${s.id}"  type="number" value="${s.cur}"  placeholder="현재가">
              <input id="eQty-${s.id}"  type="number" value="${s.qty}"  placeholder="수량">
            </div>
            <div class="edit-form-actions">
              <button class="cancel-btn" onclick="toggleEdit(${s.id})">취소</button>
              <button class="save-btn"   onclick="saveEdit(${s.id})">저장</button>
            </div>
          </div>
          <div class="card-actions">
            <button class="action-btn edit"     onclick="toggleEdit(${s.id})">✏️ 수정</button>
            <button class="action-btn sell"     onclick="sellStock(${s.id})">💰 매도</button>
            <button class="action-btn delete-a" onclick="deleteStock(${s.id})">🗑 삭제</button>
          </div>
        </div>`;
    }).join('');

    summary.style.display = 'flex';
    recordWrap.style.display = 'flex';
    const tcls  = totalPnl > 0 ? 'profit' : totalPnl < 0 ? 'loss' : 'zero';
    const tsign = totalPnl > 0 ? '+' : '';
    totalEl.className = `summary-val ${tcls}`;
    totalEl.textContent = `${tsign}${fmt(totalPnl)}`;
  }

  function recordToday() {
    if (stocks.length === 0) return;
    const today = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\. /g,'-').replace('.','');
    const total = stocks.reduce((sum, s) => sum + (s.cur - s.avg) * s.qty, 0);

    const idx = history.findIndex(h => h.date === today);
    if (idx !== -1) {
      history[idx].pnl = total;
    } else {
      history.unshift({ date: today, pnl: total });
    }

    localStorage.setItem('pnlHistory', JSON.stringify(history));
    renderHistory();
    alert('오늘 손익이 기록됐어요 ✅');
  }

  function clearHistory() {
    if (!confirm('일자별 기록을 전부 삭제할까요?')) return;
    history = [];
    localStorage.setItem('pnlHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const el = document.getElementById('historyTable');

    if (history.length === 0) {
      el.innerHTML = '<p class="no-history">아직 기록이 없어요 — 오늘 손익을 기록해보세요!</p>';
      return;
    }

    const rows = history.map((h, i) => {
      const cls  = h.pnl > 0 ? 'profit' : h.pnl < 0 ? 'loss' : 'zero';
      const sign = h.pnl > 0 ? '+' : '';

      let diffHTML = '<span class="diff-col same">—</span>';
      if (i < history.length - 1) {
        const diff = h.pnl - history[i + 1].pnl;
        if (diff > 0)      diffHTML = `<span class="diff-col up">▲ +${fmt(diff)}</span>`;
        else if (diff < 0) diffHTML = `<span class="diff-col down">▼ ${fmt(diff)}</span>`;
        else               diffHTML = `<span class="diff-col same">— 변동없음</span>`;
      }

      return `
        <tr>
          <td class="date-col">${h.date}</td>
          <td class="pnl-col ${cls}">${sign}${fmt(h.pnl)}</td>
          <td>${diffHTML}</td>
        </tr>`;
    }).join('');

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>총 손익</th>
            <th>전일 대비</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  render();
  renderHistory();
</script>
</body>
</html>
