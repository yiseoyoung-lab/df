<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>테스트 사이트</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
    text-align:center;
    font-family:'Pretendard', sans-serif;
}

textarea{
    width:1000px;
    height:80px;
    margin-top:20px;
}

button{
    margin-top:100px;
    padding:8px 15px;
    margin:5px;
}

#posts{
    width:1000px;
    margin:10px auto;
    display:grid;
    grid-template-columns: repeat(3, 300px);
    justify-content:space-between;
}

.post{
    border:1px solid #ccc;
    width:300px;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

/* 네온 버튼 */

.neon-btn{
    position:relative;
    padding:10px 25px;
    font-size:16px;
    color:white;
    background:black;
    border:none;
    cursor:pointer;
    border-radius:8px;
    overflow:hidden;
}

.neon-btn span{
    position:relative;
    z-index:2;
}

/* 네온 glow */

.neon-btn::before{
    content:"";
    position:absolute;
    top:-3px;
    left:-3px;
    right:-3px;
    bottom:-3px;
    background:linear-gradient(
        45deg,
        #ff0000,
        #ff7300,
        #fffb00,
        #48ff00,
        #00ffd5,
        #002bff,
        #7a00ff,
        #ff00c8,
        #ff0000
    );
    background-size:400%;
    filter:blur(8px);
    animation:neonGlow 20s linear infinite;
    z-index:1;
}

@keyframes neonGlow{
    0%{background-position:0 0;}
    50%{background-position:400% 0;}
    100%{background-position:0 0;}
}

</style>
</head>

<body>

<h1>익명 보장! 아무말 게시판</h1>
<p id="typing"></p>

<textarea id="text"></textarea><br>

<button class="neon-btn" onclick="addPost()">
<span>등록</span>
</button>

<div id="posts"></div>

<script>

/* 타이핑 효과 */

const text = "욕설 가능! 일 하지말고 월루 해라 😊";
const typingElement = document.getElementById("typing");

let index = 0;

function type(){
 if(index < text.length){
  typingElement.innerHTML += text.charAt(index);
  index++;
  setTimeout(type,80);
 }
}

type();

/* 게시판 기능 */

let nicknames = [
"화난참치","지친고양이","분노한햄스터",
"야근요정","퇴사마려움","슬픈판다",
"피곤한너구리","현타온곰"
]

let posts = JSON.parse(localStorage.getItem("posts")) || []

function savePosts(){
 localStorage.setItem("posts", JSON.stringify(posts))
}

function renderPosts(){

 document.getElementById("posts").innerHTML=""

 posts.forEach((post,index)=>{

  let postDiv = document.createElement("div")
  postDiv.className="post"

  let name = document.createElement("b")
  name.innerText = post.nickname

  let textDiv = document.createElement("div")
  textDiv.innerText = post.text

  let likeBtn = document.createElement("button")
  likeBtn.innerText = "👍 " + post.likes

  likeBtn.onclick = function(){
   post.likes++
   savePosts()
   renderPosts()
  }

  let deleteBtn = document.createElement("button")
  deleteBtn.innerText="Delete"

  deleteBtn.onclick=function(){
   posts.splice(index,1)
   savePosts()
   renderPosts()
  }

  postDiv.appendChild(name)
  postDiv.appendChild(document.createElement("br"))
  postDiv.appendChild(textDiv)
  postDiv.appendChild(likeBtn)
  postDiv.appendChild(deleteBtn)

  document.getElementById("posts").appendChild(postDiv)

 })

}

function addPost(){

 let text = document.getElementById("text").value

 if(text===""){
  return
 }

 let randomName = nicknames[Math.floor(Math.random()*nicknames.length)]

 let newPost = {
  nickname: randomName,
  text: text,
  likes: 0
 }

 posts.unshift(newPost)

 savePosts()

 renderPosts()

 document.getElementById("text").value=""

}

renderPosts()

</script>

</body>
</html>
