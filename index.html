<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이서영 테스트 사이트</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
body {
    text-align: center;
    font-family: 'Pretendard', sans-serif;
}

textarea {
    width: 1000px;
    height: 80px;
    margin-top: 20px;
}

/* 일반 버튼 (좋아요, Delete 등) */
button {
    margin: 5px;
    padding: 8px 15px;
}

#posts {
    width: 1000px;
    margin: 10px auto;
    display: grid;
    grid-template-columns: repeat(3, 300px);
    justify-content: space-between;
}

.post {
    border: 1px solid #ccc;
    width: 300px;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

/* ------------------ 등록 버튼 ------------------ */
button.button {
    --bg: #f0db4f;
    --hover-bg: #ff6b6b;
    position: relative;
    margin: 5px;
    padding: 12px 40px;
    border: none;
    background: var(--bg);
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a1a1a;
    font-weight: 600;
    overflow: hidden;
    transition: transform 0.2s;
    z-index: 0;
}

button.button::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--hover-bg);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 0;
}

button.button:hover::before {
    opacity: 1;
}

button.button:hover {
    transform: translateY(-3px);
}

button.button .button-text {
    position: relative;
    z-index: 1;
    color: inherit;
    font-weight: 600;
}

/* ------------------ 타이핑 효과 ------------------ */
#typing {
    font-size: 18px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>이서영 포트폴리오</h1>
<p id="typing"></p>

<textarea id="text" placeholder="여기에 글을 입력하세요..."></textarea><br>

<button class="button" onclick="addPost()">
  <span class="button-text">등록</span>
</button>

<div id="posts"></div>

<script>
/* ------------------ 타이핑 효과 ------------------ */
const text = "나의 목표 : 파이어족 🔥";
const typingElement = document.getElementById("typing");
let index = 0;

function type() {
    if (index < text.length) {
        typingElement.innerHTML += text.charAt(index);
        index++;
        setTimeout(type, 80);
    }
}
type();



</body>
</html>
