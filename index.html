<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>주식 손익 계산기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 40px 20px;
  }

  h1 {
    text-align: center;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #f0db4f;
    margin-bottom: 8px;
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 36px;
  }

  .input-section {
    max-width: 560px;
    margin: 0 auto 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  input {
    flex: 1;
    padding: 12px 16px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #f0f0f0;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: #f0db4f;
  }

  input::placeholder {
    color: #444;
  }

  /* 사이버펑크 버튼 */
  button.button {
    --bg: #f0db4f;
    --hover-bg: #ff6b6b;
    position: relative;
    padding: 13px 32px;
    border: none;
    background: var(--bg);
    cursor: pointer;
    clip-path: polygon(92% 0, 100% 25%, 100% 100%, 8% 100%, 0% 75%, 0 0);
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a1a1a;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Pretendard', sans-serif;
    overflow: hidden;
    transition: transform 0.2s;
    white-space: nowrap;
  }

  button.button::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--hover-bg);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 0;
  }

  button.button:hover::before { opacity: 1; }
  button.button:hover { transform: translateY(-2px); }

  button.button span {
    position: relative;
    z-index: 1;
  }

  .naver-btn {
    background: none;
    border: 1px solid #333;
    border-radius: 4px;
    color: #03c75a;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    padding: 0 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .naver-btn:hover { background: #1a1a1a; }

  /* 결과 카드 */
  .results {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
    position: relative;
  }

  .card-left { display: flex; flex-direction: column; gap: 6px; }

  .stock-name {
    font-size: 15px;
    font-weight: 600;
    color: #f0f0f0;
  }

  .stock-detail {
    font-size: 12px;
    color: #555;
  }

  .card-right {
    text-align: right;
  }

  .pnl {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .pnl.profit { color: #ff6b6b; }
  .pnl.loss   { color: #4d9fff; }
  .pnl.zero   { color: #666; }

  .pnl-rate {
    font-size: 12px;
    margin-top: 2px;
  }

  .pnl-rate.profit { color: #ff6b6b88; }
  .pnl-rate.loss   { color: #4d9fff88; }

  .delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    color: #333;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.2s;
    padding: 2px 6px;
  }

  .delete-btn:hover { color: #ff6b6b; }

  .empty {
    text-align: center;
    color: #333;
    font-size: 13px;
    padding: 40px 0;
  }

  /* 총합 요약 */
  .summary {
    max-width: 560px;
    margin: 20px auto 0;
    border-top: 1px solid #222;
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .summary-label {
    font-size: 13px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .summary-val {
    font-size: 20px;
    font-weight: 700;
  }
</style>
</head>
<body>

<h1>📈 주식 손익 계산기</h1>
<p class="subtitle">평단가와 현재가를 입력하면 손익을 계산해드려요</p>

<div class="input-section">
  <div class="row">
    <input id="stockName" type="text" placeholder="종목명 (예: 삼성전자)">
    <button class="naver-btn" onclick="openNaver()">네이버 증권 →</button>
  </div>
  <div class="row">
    <input id="avgPrice" type="number" placeholder="평단가 (원)">
    <input id="curPrice" type="number" placeholder="현재가 (원)">
    <input id="quantity" type="number" placeholder="수량 (주)">
  </div>
  <div class="row" style="justify-content:center;">
    <button class="button" onclick="addStock()"><span>추가하기</span></button>
  </div>
</div>

<div class="results" id="results">
  <p class="empty">종목을 추가해보세요 👆</p>
</div>

<div class="summary" id="summary" style="display:none;">
  <span class="summary-label">총 손익</span>
  <span class="summary-val" id="totalPnl">—</span>
</div>

<script>
  let stocks = JSON.parse(localStorage.getItem('stocks') || '[]');

  function openNaver() {
    const name = document.getElementById('stockName').value.trim();
    const query = name || '주식';
    window.open(`https://finance.naver.com/search/searchList.naver?query=${encodeURIComponent(query)}`, '_blank');
  }

  function addStock() {
    const name    = document.getElementById('stockName').value.trim();
    const avg     = parseFloat(document.getElementById('avgPrice').value);
    const cur     = parseFloat(document.getElementById('curPrice').value);
    const qty     = parseFloat(document.getElementById('quantity').value) || 1;

    if (!name || isNaN(avg) || isNaN(cur)) {
      alert('종목명, 평단가, 현재가를 모두 입력해주세요!');
      return;
    }

    stocks.push({ name, avg, cur, qty, id: Date.now() });
    localStorage.setItem('stocks', JSON.stringify(stocks));

    document.getElementById('stockName').value = '';
    document.getElementById('avgPrice').value  = '';
    document.getElementById('curPrice').value  = '';
    document.getElementById('quantity').value  = '';

    render();
  }

  function deleteStock(id) {
    stocks = stocks.filter(s => s.id !== id);
    localStorage.setItem('stocks', JSON.stringify(stocks));
    render();
  }

  function fmt(n) {
    return n.toLocaleString('ko-KR') + '원';
  }

  function render() {
    const container = document.getElementById('results');
    const summary   = document.getElementById('summary');
    const totalEl   = document.getElementById('totalPnl');

    if (stocks.length === 0) {
      container.innerHTML = '<p class="empty">종목을 추가해보세요 👆</p>';
      summary.style.display = 'none';
      return;
    }

    let totalPnl = 0;

    container.innerHTML = stocks.map(s => {
      const pnl     = (s.cur - s.avg) * s.qty;
      const rate    = ((s.cur - s.avg) / s.avg * 100).toFixed(2);
      const cls     = pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : 'zero';
      const sign    = pnl > 0 ? '+' : '';
      const arrow   = pnl > 0 ? '▲' : pnl < 0 ? '▼' : '–';
      totalPnl += pnl;

      return `
        <div class="card">
          <button class="delete-btn" onclick="deleteStock(${s.id})">✕</button>
          <div class="card-left">
            <span class="stock-name">${s.name}</span>
            <span class="stock-detail">평단 ${fmt(s.avg)} → 현재 ${fmt(s.cur)} · ${s.qty}주</span>
          </div>
          <div class="card-right">
            <div class="pnl ${cls}">${sign}${fmt(pnl)}</div>
            <div class="pnl-rate ${cls}">${arrow} ${sign}${rate}%</div>
          </div>
        </div>`;
    }).join('');

    summary.style.display = 'flex';
    const tcls = totalPnl > 0 ? 'profit' : totalPnl < 0 ? 'loss' : 'zero';
    const tsign = totalPnl > 0 ? '+' : '';
    totalEl.className = `summary-val ${tcls}`;
    totalEl.textContent = `${tsign}${fmt(totalPnl)}`;
  }

  render();
</script>
</body>
</html>
