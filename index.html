<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이서영 테스트 사이트</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
body {
    text-align: center;
    font-family: 'Pretendard', sans-serif;
}

textarea {
    width: 1000px;
    height: 80px;
    margin-top: 20px;
}

button {
    margin: 5px;
    padding: 8px 15px;
}

#posts {
    width: 1000px;
    margin: 10px auto;
    display: grid;
    grid-template-columns: repeat(3, 300px);
    justify-content: space-between;
}

.post {
    border: 1px solid #ccc;
    width: 300px;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

/* ------------------ 네온 버튼 ------------------ */
.button {
    --bg: #ff8fb1;
    --radius: 12px;
    --border-width: 3px;
    position: relative;
    padding: 12px 28px;
    border: none;
    border-radius: var(--radius);
    background: transparent; /* 배경을 투명으로 */
    cursor: pointer;
    transition: transform 0.2s;
    z-index: 0;
}
.button:hover {
    transform: scale(1.08);
}

/* 회전하는 conic-gradient — overflow: hidden 없이 바깥에 위치 */
.button::before {
    content: "";
    position: absolute;
    inset: calc(var(--border-width) * -1);   /* 테두리만큼 바깥으로 */
    border-radius: calc(var(--radius) + var(--border-width));
    background: conic-gradient(from 0deg, transparent 60%, white 80%, transparent 100%);
    animation: neon-spin 2s linear infinite;
    z-index: -1;
}

/* 안쪽 배경 — 버튼 실제 색상 */
.button::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: var(--bg);
    z-index: -1;
}

.button-text {
    position: relative;
    z-index: 1;
    color: white;
    font-weight: 600;
}

@keyframes neon-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

/* ------------------ 타이핑 효과 ------------------ */
#typing {
    font-size: 18px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>익명 보장! 아무말 게시판</h1>
<p id="typing"></p>

<textarea id="text" placeholder="여기에 글을 입력하세요..."></textarea><br>

<button class="button neon-button" onclick="addPost()" data-effect="spin">
  <span class="button-text">등록</span>
  <span class="shimmer"></span>
</button>

<div id="posts"></div>

<script>
/* ------------------ 타이핑 효과 ------------------ */
const text = "욕설 가능! 일 하지말고 월루 해라 😊";
const typingElement = document.getElementById("typing");
let index = 0;

function type() {
    if (index < text.length) {
        typingElement.innerHTML += text.charAt(index);
        index++;
        setTimeout(type, 80);
    }
}
type();

/* ------------------ 게시판 기능 ------------------ */
let nicknames = [
    "화난참치","지친고양이","분노한햄스터",
    "야근요정","퇴사마려움","슬픈판다",
    "피곤한너구리","현타온곰"
];

let posts = JSON.parse(localStorage.getItem("posts")) || [];

function savePosts() {
    localStorage.setItem("posts", JSON.stringify(posts));
}

function renderPosts() {
    const postsContainer = document.getElementById("posts");
    postsContainer.innerHTML = "";

    posts.forEach((post, index) => {
        const postDiv = document.createElement("div");
        postDiv.className = "post";

        const name = document.createElement("b");
        name.innerText = post.nickname;

        const textDiv = document.createElement("div");
        textDiv.innerText = post.text;

        const likeBtn = document.createElement("button");
        likeBtn.innerText = "👍 " + post.likes;
        likeBtn.onclick = function() {
            post.likes++;
            savePosts();
            renderPosts();
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Delete";
        deleteBtn.onclick = function() {
            posts.splice(index, 1);
            savePosts();
            renderPosts();
        };

        postDiv.appendChild(name);
        postDiv.appendChild(document.createElement("br"));
        postDiv.appendChild(textDiv);
        postDiv.appendChild(likeBtn);
        postDiv.appendChild(deleteBtn);

        postsContainer.appendChild(postDiv);
    });
}

function addPost() {
    let text = document.getElementById("text").value.trim();
    if (text === "") return;

    let randomName = nicknames[Math.floor(Math.random() * nicknames.length)];

    let newPost = { nickname: randomName, text: text, likes: 0 };
    posts.unshift(newPost);

    savePosts();
    renderPosts();

    document.getElementById("text").value = "";
}

renderPosts();
</script>

</body>
</html>
