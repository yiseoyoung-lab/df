<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이서영 테스트 사이트</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
body {
    text-align: center;
    font-family: 'Pretendard', sans-serif;
}

textarea {
    width: 1000px;
    height: 80px;
    margin-top: 20px;
}

button {
    margin: 5px;
    padding: 8px 15px;
}

#posts {
    width: 1000px;
    margin: 10px auto;
    display: grid;
    grid-template-columns: repeat(3, 300px);
    justify-content: space-between;
}

.post {
    border: 1px solid #ccc;
    width: 300px;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

/* ------------------ 등록 버튼 ------------------ */
    --bg: #f0db4f;
    --hover-bg: #ff6b6b;
    position: relative;
    padding: 12px 28px;
    border: none;
    background: var(--bg);
    cursor: pointer;
    clip-path: polygon(92% 0, 100% 25%, 100% 100%, 8% 100%, 0% 75%, 0 0);
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a1a1a;
    font-weight: 600;
    overflow: hidden;
    transition: transform 0.2s;
    z-index: 0;
}

.button::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--hover-bg);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 0;
}
.button:hover::before {
    opacity: 1;
}
.button:hover {
    transform: translateY(-3px);
}

.button .button-text {
    position: relative;
    z-index: 1;
    color: inherit;
    font-weight: 600;
}
/* ------------------ 타이핑 효과 ------------------ */
#typing {
    font-size: 18px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>오늘의 테스트</h1>
<p id="typing"></p>

<textarea id="text" placeholder="여기에 글을 입력하세요..."></textarea><br>

<button class="button neon-button" onclick="addPost()" data-effect="spin">
  <span class="button-text">등록</span>
  <span class="shimmer"></span>
</button>

<div id="posts"></div>

<script>
/* ------------------ 타이핑 효과 ------------------ */
const text = "오늘 자로 업데이트 😊";
const typingElement = document.getElementById("typing");
let index = 0;

function type() {
    if (index < text.length) {
        typingElement.innerHTML += text.charAt(index);
        index++;
        setTimeout(type, 80);
    }
}
type();

/* ------------------ 게시판 기능 ------------------ */
let nicknames = [
    "화난참치","지친고양이","분노한햄스터",
    "야근요정","퇴사마려움","슬픈판다",
    "피곤한너구리","현타온곰"
];

let posts = JSON.parse(localStorage.getItem("posts")) || [];

function savePosts() {
    localStorage.setItem("posts", JSON.stringify(posts));
}

function renderPosts() {
    const postsContainer = document.getElementById("posts");
    postsContainer.innerHTML = "";

    posts.forEach((post, index) => {
        const postDiv = document.createElement("div");
        postDiv.className = "post";

        const name = document.createElement("b");
        name.innerText = post.nickname;

        const textDiv = document.createElement("div");
        textDiv.innerText = post.text;

        const likeBtn = document.createElement("button");
        likeBtn.innerText = "👍 " + post.likes;
        likeBtn.onclick = function() {
            post.likes++;
            savePosts();
            renderPosts();
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Delete";
        deleteBtn.onclick = function() {
            posts.splice(index, 1);
            savePosts();
            renderPosts();
        };

        postDiv.appendChild(name);
        postDiv.appendChild(document.createElement("br"));
        postDiv.appendChild(textDiv);
        postDiv.appendChild(likeBtn);
        postDiv.appendChild(deleteBtn);

        postsContainer.appendChild(postDiv);
    });
}

function addPost() {
    let text = document.getElementById("text").value.trim();
    if (text === "") return;

    let randomName = nicknames[Math.floor(Math.random() * nicknames.length)];

    let newPost = { nickname: randomName, text: text, likes: 0 };
    posts.unshift(newPost);

    savePosts();
    renderPosts();

    document.getElementById("text").value = "";
}

renderPosts();
</script>

</body>
</html>
