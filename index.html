<style>

body{
    text-align:center;
    font-family:'Pretendard', sans-serif;
}

textarea{
    width:1000px;
    height:80px;
    margin-top:20px;
}

button{
    margin-top:100px;
    padding:8px 15px;
}

#posts{
    width:1000px;
    margin:10px auto;
    display:grid;
    grid-template-columns: repeat(3, 300px);
    justify-content:space-between;
}

.post{
    border:1px solid #ccc;
    width:300px;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

button{
    margin:5px;
}

#typing{
    margin-top:10px;
    color:#555;
}

/* 좋아요 버튼 */
.like-btn{
    background:#e5e7eb;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* 삭제 버튼 */
.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* 네온 버튼 */
.neon-btn{
    position:relative;
    padding:10px 25px;
    font-size:16px;
    color:white;
    background:black;
    border:none;
    cursor:pointer;
    border-radius:8px;
    overflow:hidden;
}

/* 네온 효과 */
.neon-btn::before{
    content:"";
    position:absolute;
    top:-2px;
    left:-2px;
    right:-2px;
    bottom:-2px;
    background:linear-gradient(
        45deg,
        #ff0000,
        #ff7300,
        #fffb00,
        #48ff00,
        #00ffd5,
        #002bff,
        #7a00ff,
        #ff00c8,
        #ff0000
    );
    background-size:400%;
    filter:blur(6px);
    z-index:-1;
    opacity:0;
    transition:0.3s;
    animation:neonGlow 20s linear infinite;
}

.neon-btn:hover::before{
    opacity:1;
}

/* 애니메이션 */
@keyframes neonGlow{
    0%{background-position:0 0;}
    50%{background-position:400% 0;}
    100%{background-position:0 0;}
}

</style>
